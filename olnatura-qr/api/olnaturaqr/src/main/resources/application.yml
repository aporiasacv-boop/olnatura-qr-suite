server:
  port: 3001
  address: 0.0.0.0

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/olnatura_qr
    username: olnatura
    password: olnatura123

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: "http://localhost:5173,http://localhost:3000,http://192.168.41.177:5173,http://192.168.41.177:3000,http://192.168.41.206:3000,http://192.168.41.206:5173,http://192.168.41.230:5173,http://192.168.41.230:3000"

  auth:
    cookie:
      name: "qr_session"
      max-age-seconds: 86400
      secure: false
      same-site: "Lax"

jwt:
  secret: ${JWT_SECRET:dev-secret-change-me-please-dev-secret-change-me}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

